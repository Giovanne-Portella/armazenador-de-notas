<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Tools Supp Robbu</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>
    <!-- Loading enquanto verifica sessão -->
    <div class="login-loading" id="loginLoading">
        <div class="spinner"></div>
    </div>

    <!-- Container de login (oculto até verificar) -->
    <div class="login-container" id="loginContainer" style="display: none;">
        <div class="login-card">
            <div class="login-header">
                <span class="login-emoji">📝</span>
                <h1>Tarefas &amp; Análises</h1>
                <p class="login-subtitle">Organize suas notas e análises de forma inteligente</p>
            </div>
            <div class="login-body">
                <button class="btn-google" id="googleLoginBtn" type="button">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Entrar com Google
                </button>
            </div>
            <div class="login-footer">
                <div class="login-features">
                    <span>🔒 Dados seguros</span>
                    <span>☁️ Sincronizado na nuvem</span>
                    <span>📱 Acesse de qualquer lugar</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';
        import { signInWithGoogle, getSession } from './js/auth.js';

        // Aplica dark mode salvo
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
        const savedTheme = localStorage.getItem('selectedTheme');
        if (savedTheme) document.body.classList.add(savedTheme);

        // Detecta login concluído (redirect OAuth ou login externo)
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.href = '/';
            }
        });

        // Quando o app volta ao foco (ex: usuário logou no browser externo)
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                const session = await getSession();
                if (session) window.location.href = '/';
            }
        });

        // Se já logado, redireciona para o app
        async function init() {
            const session = await getSession();
            if (session) {
                window.location.href = '/';
                return;
            }
            document.getElementById('loginLoading').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
        }

        init();
        document.getElementById('googleLoginBtn').addEventListener('click', signInWithGoogle);
    </script>

    <!-- Toast container (necessário para showToast funcionar) -->
    <div id="toastContainer" class="toast-container"></div>
</body>
</html>
