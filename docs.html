<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentação - Tools Supp Robbu</title>

    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- CSS Compartilhado (variáveis e temas) -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/docs.css" />
</head>
<body>

    <!-- Aplica dark mode / tema antes de renderizar -->
    <script>
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        var st = localStorage.getItem('selectedTheme');
        if (st) document.body.classList.add(st);
    </script>

    <!-- ========== LOADING ========== -->
    <div id="appLoading" class="app-loading">
        <div class="app-loading-inner">
            <span class="app-loading-emoji">📄</span>
            <div class="app-loading-spinner"></div>
            <p>Carregando documentação...</p>
        </div>
    </div>

    <!-- ========== CONTEÚDO ========== -->
    <div id="appContent" style="display: none;">

        <!-- ========== HEADER ========== -->
        <header class="doc-header">
            <div class="doc-header-left">
                <a href="index.html" class="doc-back-btn" title="Voltar para Notas">←</a>
                <button class="doc-sidebar-toggle" onclick="toggleSidebar()" title="Meus Documentos">☰</button>
                <input type="text" class="doc-title-input" id="currentDocTitle" value="Sem título" placeholder="Título do documento..." />
            </div>
            <div class="doc-header-right">
                <span class="doc-save-status" id="saveStatus">Salvo</span>
                <button class="doc-tool-btn" onclick="toggleTOC()" title="Sumário">📑</button>
                <button class="doc-tool-btn" onclick="openShareModal()" title="Compartilhar">🤝</button>
                <button class="doc-tool-btn" onclick="manualSave()" title="Salvar (Ctrl+S)">💾</button>
                <select id="themeSelector" class="doc-theme-select">
                    <option value="">Tema Padrão</option>
                    <option value="theme-blue">Azul</option>
                    <option value="theme-green">Verde</option>
                    <option value="theme-red">Vermelho</option>
                    <option value="theme-orange">Laranja</option>
                    <option value="theme-purple">Roxo</option>
                </select>
                <button class="btn-icon" id="darkModeToggle" title="Alternar modo escuro">🌙</button>
                <img id="userAvatar" class="user-avatar" alt="Avatar" />
            </div>
        </header>

        <!-- ========== SIDEBAR: Lista de Documentos ========== -->
        <aside class="doc-sidebar" id="sidebar">
            <div class="doc-sidebar-header">
                <h2>Documentos</h2>
                <button class="doc-sidebar-new" onclick="createNewDoc()" title="Novo Documento">+ Novo</button>
            </div>
            <div class="doc-sidebar-section">
                <h3>Meus Documentos</h3>
                <div class="doc-sidebar-list" id="myDocsList"></div>
            </div>
            <div class="doc-sidebar-section">
                <h3>Compartilhados comigo</h3>
                <div class="doc-sidebar-list" id="sharedDocsList"></div>
            </div>
        </aside>
        <div class="doc-sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- ========== MAIN: Editor ========== -->
        <main class="doc-main">
            <!-- Toolbar de Formatação -->
            <div class="doc-toolbar" id="docToolbar">
                <div class="doc-toolbar-row">
                    <div class="doc-toolbar-group">
                        <select class="doc-toolbar-select" id="headingSelect" onchange="applyHeading(this.value); this.value='';">
                            <option value="">Título</option>
                            <option value="h1">H1 — Título</option>
                            <option value="h2">H2 — Subtítulo</option>
                            <option value="h3">H3 — Seção</option>
                            <option value="p">Normal</option>
                        </select>
                    </div>
                    <div class="doc-toolbar-group">
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('bold')" title="Negrito (Ctrl+B)"><strong>B</strong></button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('italic')" title="Itálico (Ctrl+I)"><em>I</em></button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('underline')" title="Sublinhado (Ctrl+U)"><u>U</u></button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('strikeThrough')" title="Riscado"><s>S</s></button>
                    </div>
                    <div class="doc-toolbar-group">
                        <select class="doc-toolbar-select" onchange="changeFontSize(this.value); this.value='';">
                            <option value="">Tamanho</option>
                            <option value="12px">12px</option>
                            <option value="14px">14px</option>
                            <option value="16px">16px</option>
                            <option value="18px">18px</option>
                            <option value="20px">20px</option>
                            <option value="24px">24px</option>
                            <option value="28px">28px</option>
                            <option value="32px">32px</option>
                        </select>
                        <select class="doc-toolbar-select" onchange="fmt('fontName', this.value); this.value='';">
                            <option value="">Fonte</option>
                            <option value="Arial">Arial</option>
                            <option value="Times New Roman">Times</option>
                            <option value="Courier New">Courier</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Verdana">Verdana</option>
                        </select>
                    </div>
                    <div class="doc-toolbar-group">
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('justifyLeft')" title="Alinhar à esquerda">◀</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('justifyCenter')" title="Centralizar">▬</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('justifyRight')" title="Alinhar à direita">▶</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('justifyFull')" title="Justificar">☰</button>
                    </div>
                    <div class="doc-toolbar-group">
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('insertUnorderedList')" title="Lista com marcadores">• ◦</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('insertOrderedList')" title="Lista numerada">1. 2.</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('indent')" title="Aumentar recuo">→|</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('outdent')" title="Diminuir recuo">|←</button>
                    </div>
                    <div class="doc-toolbar-group" id="docTextColorPalette"></div>
                    <div class="doc-toolbar-group">
                        <button class="doc-tb" onmousedown="event.preventDefault(); insertLink()" title="Inserir link">🔗</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); document.getElementById('docImageUpload').click()" title="Inserir imagem">🖼️</button>
                        <input accept="image/*" class="doc-image-upload" id="docImageUpload" onchange="insertImage(this)" type="file" />
                        <button class="doc-tb" onmousedown="event.preventDefault(); insertHR()" title="Linha horizontal">─</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); insertCodeBlock()" title="Bloco de código">&lt;/&gt;</button>
                        <button class="doc-tb" onmousedown="event.preventDefault(); fmt('removeFormat')" title="Remover formatação">🚫</button>
                    </div>
                </div>
            </div>

            <!-- Editor -->
            <div class="doc-editor-wrapper" id="editorWrapper">
                <div class="doc-editor" contenteditable="true" id="docEditor" spellcheck="true"></div>
            </div>
        </main>

        <!-- ========== TOC (Table of Contents) ========== -->
        <aside class="doc-toc" id="tocPanel">
            <div class="doc-toc-header">
                <h3>Sumário</h3>
                <button class="doc-toc-close" onclick="toggleTOC()">&times;</button>
            </div>
            <nav class="doc-toc-list" id="tocList"></nav>
        </aside>

        <!-- ========== MODAL: Compartilhar ========== -->
        <div class="doc-modal" id="shareModal">
            <div class="doc-modal-content">
                <div class="doc-modal-header">
                    <h2>🤝 Compartilhar documento</h2>
                    <button class="doc-modal-close" onclick="closeShareModal()">&times;</button>
                </div>
                <div class="doc-modal-body">
                    <div class="doc-share-section">
                        <h4>Compartilhar com amigos</h4>
                        <div id="shareFriendsList" class="doc-share-friends-list"></div>
                    </div>
                    <div class="doc-share-section">
                        <h4>Quem tem acesso</h4>
                        <div id="currentSharesList" class="doc-current-shares-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== MODAL: Tema Mobile ========== -->
        <div class="doc-modal" id="themeMobileModal">
            <div class="doc-modal-content doc-modal-xs">
                <div class="doc-modal-header">
                    <h2>Aparência</h2>
                    <button class="doc-modal-close" onclick="closeThemeMobileModal()">&times;</button>
                </div>
                <div class="doc-modal-body">
                    <div class="theme-mobile-section">
                        <label class="section-label">Modo</label>
                        <div class="theme-mobile-toggle">
                            <button id="lightModeBtn" onclick="setDarkMode(false)" type="button">☀️ Claro</button>
                            <button id="darkModeBtn" onclick="setDarkMode(true)" type="button">🌙 Escuro</button>
                        </div>
                    </div>
                    <div class="theme-mobile-section">
                        <label class="section-label">Tema de Cores</label>
                        <div class="theme-mobile-options" id="themeMobileOptions">
                            <button class="theme-option" data-theme="" onclick="selectThemeMobile('')">🎨 Padrão</button>
                            <button class="theme-option" data-theme="theme-blue" onclick="selectThemeMobile('theme-blue')">💙 Azul</button>
                            <button class="theme-option" data-theme="theme-green" onclick="selectThemeMobile('theme-green')">💚 Verde</button>
                            <button class="theme-option" data-theme="theme-red" onclick="selectThemeMobile('theme-red')">❤️ Vermelho</button>
                            <button class="theme-option" data-theme="theme-orange" onclick="selectThemeMobile('theme-orange')">🧡 Laranja</button>
                            <button class="theme-option" data-theme="theme-purple" onclick="selectThemeMobile('theme-purple')">💜 Roxo</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div> <!-- /appContent -->

    <!-- ========== TOAST CONTAINER ========== -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ========== JS MODULE ========== -->
    <script type="module" src="js/docs.js"></script>

</body>
</html>
